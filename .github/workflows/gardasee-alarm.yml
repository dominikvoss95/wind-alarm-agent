name: Daily Gardasee Wind Alarm Check

on:
  schedule:
    # Runs every 15 minutes between 03:00 and 08:00 UTC (05:00 - 10:00 CEST).
    # This covers the typical early morning "Pelér" wind window at Gardasee.
    - cron: '*/15 3-8 * * *'
  
  # Allow manual triggering of the workflow from the GitHub UI
  workflow_dispatch:

jobs:
  check-wind:
    runs-on: ubuntu-latest

    env:
      FCM_TOPIC: "wind_alarms_gardasee" # Explicit for Gardasee

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Browsers
        run: |
          playwright install chromium

      - name: Create Firebase Service Account Key
        run: |
          echo "${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}" > serviceAccountKey.json
        if: "${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON != '' }}"

      - name: Run Wind Alarm Agent for Gardasee
        run: |
          PYTHONPATH=src python app.py --location gardasee --threshold 12.0
        env:
          PYTHONPATH: src
