name: Daily Wind Alarm Check

on:
  schedule:
    # Runs every 15 minutes between 03:00 and 06:00 UTC (05:00 - 08:00 CEST).
    # This covers the typical early morning wind window at Kochelsee.
    - cron: '*/15 3-6 * * *'
  
  # Allow manual triggering of the workflow from the GitHub UI
  workflow_dispatch:

jobs:
  check-wind:
    runs-on: ubuntu-latest

    env:
      FCM_TOPIC: "wind_alarms" # Consistent with app.py and Flutter app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Browsers
        run: |
          playwright install chromium

      - name: Create Firebase Service Account Key
        # This takes the content of the GH Secret and writes it to the file path defined in config.py
        run: |
          echo "${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}" > serviceAccountKey.json
        if: "${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON != '' }}"

      - name: Run Wind Alarm Agent
        run: |
          PYTHONPATH=src python app.py --location kochelsee --threshold 10.0
        env:
          PYTHONPATH: src
